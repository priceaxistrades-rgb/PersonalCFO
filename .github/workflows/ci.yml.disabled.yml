name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

      # Moderate findings currently originate from Next/PostCSS and drizzle-kit
      # transitive tooling and have no non-breaking npm resolution. Continue to
      # report them below, but fail the release gate only for high/critical risk.
      - name: Dependency Audit
        run: npm audit --audit-level=high

      - name: Security Scan (npm audit)
        if: always()
        run: |
          npm audit --json > audit.json || true
          cat audit.json | jq '.metadata.vulnerabilities' || echo "Audit completed"